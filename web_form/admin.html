<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NexoRig 系统后台</title>
    <link rel="icon" type="image/svg+xml" href="/web_form/assets/drilling-completion-logo.svg" />
    <link rel="stylesheet" href="/web_form/styles.css?v=npt-well-markers-1" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="系统后台菜单">
        <div class="brand">
          <div class="brand-mark brand-logo" aria-label="NexoRig 钻完井平台标志">
            <img class="brand-logo-image" src="/web_form/assets/drilling-completion-logo.svg" alt="" />
          </div>
          <div>
            <strong>NexoRig</strong>
            <span>钻完井管理平台</span>
          </div>
        </div>
        <nav class="system-nav admin-sidebar-nav">
          <div class="menu-group open">
            <button class="menu-group-toggle" type="button" aria-expanded="true">
              <img class="menu-group-icon" src="/web_form/icons/nav/chart-histogram.svg" alt="" />
              <span>运营工作台</span>
              <img class="menu-chevron" src="/web_form/icons/nav/chevron-down.svg" alt="" />
            </button>
            <div class="menu-items">
              <a href="#" class="menu-link admin-menu-link active" data-admin-tab="overview"><img class="menu-item-icon" src="/web_form/icons/nav/gauge.svg" alt="" /><span>总览</span></a>
              <a href="#" class="menu-link admin-menu-link" data-admin-tab="projects"><img class="menu-item-icon" src="/web_form/icons/nav/briefcase.svg" alt="" /><span>项目与队伍</span></a>
            </div>
          </div>
          <div class="menu-group open">
            <button class="menu-group-toggle" type="button" aria-expanded="true">
              <img class="menu-group-icon" src="/web_form/icons/nav/sparkles.svg" alt="" />
              <span>AI 工作流</span>
              <img class="menu-chevron" src="/web_form/icons/nav/chevron-down.svg" alt="" />
            </button>
            <div class="menu-items">
              <a href="#" class="menu-link admin-menu-link" data-admin-tab="aiModels"><img class="menu-item-icon" src="/web_form/icons/nav/cpu.svg" alt="" /><span>模型接入</span></a>
              <a href="#" class="menu-link admin-menu-link" data-admin-tab="translationTuning"><img class="menu-item-icon" src="/web_form/icons/nav/language.svg" alt="" /><span>翻译策略</span></a>
              <a href="#" class="menu-link admin-menu-link" data-admin-tab="aiExtraction"><img class="menu-item-icon" src="/web_form/icons/nav/sparkles.svg" alt="" /><span>数据提炼</span></a>
            </div>
          </div>
          <div class="menu-group open">
            <button class="menu-group-toggle" type="button" aria-expanded="true">
              <img class="menu-group-icon" src="/web_form/icons/nav/shield-check.svg" alt="" />
              <span>系统治理</span>
              <img class="menu-chevron" src="/web_form/icons/nav/chevron-down.svg" alt="" />
            </button>
            <div class="menu-items">
              <a href="#" class="menu-link admin-menu-link" data-admin-tab="users"><img class="menu-item-icon" src="/web_form/icons/nav/users.svg" alt="" /><span>账号管理</span></a>
              <a href="#" class="menu-link admin-menu-link" data-admin-tab="roles"><img class="menu-item-icon" src="/web_form/icons/nav/shield-check.svg" alt="" /><span>角色权限</span></a>
              <a href="#" class="menu-link admin-menu-link" data-admin-tab="config"><img class="menu-item-icon" src="/web_form/icons/nav/settings.svg" alt="" /><span>系统参数</span></a>
              <a href="#" class="menu-link admin-menu-link" data-admin-tab="data"><img class="menu-item-icon" src="/web_form/icons/nav/database.svg" alt="" /><span>数据维护</span></a>
              <a href="#" class="menu-link admin-menu-link" data-admin-tab="logs"><img class="menu-item-icon" src="/web_form/icons/nav/list-details.svg" alt="" /><span>审计日志</span></a>
            </div>
          </div>
        </nav>
        <div class="sidebar-bottom-actions">
          <a class="menu-link sidebar-system-link" href="/web_form/">
            <img class="menu-item-icon" src="/web_form/icons/nav/home.svg" alt="" />
            <span>返回前台</span>
          </a>
        </div>
      </aside>

      <main class="workspace admin-standalone">
        <header class="topbar placeholder-topbar">
          <div>
            <p class="page-kicker">SYSTEM ADMIN</p>
            <h1>系统后台</h1>
            <p class="source-file-name">账号权限、系统参数、数据维护与操作审计</p>
          </div>
          <div class="top-actions">
            <button class="button secondary" type="button" data-admin-logout>退出登录</button>
          </div>
        </header>

        <section class="admin-console" data-admin-console>
          <section class="admin-panel" data-admin-panel="overview"></section>
          <section class="admin-panel" data-admin-panel="users" hidden></section>
          <section class="admin-panel" data-admin-panel="roles" hidden></section>
          <section class="admin-panel" data-admin-panel="aiModels" hidden></section>
          <section class="admin-panel" data-admin-panel="aiExtraction" hidden></section>
          <section class="admin-panel" data-admin-panel="projects" hidden></section>
          <section class="admin-panel" data-admin-panel="translationTuning" hidden></section>
          <section class="admin-panel" data-admin-panel="config" hidden></section>
          <section class="admin-panel" data-admin-panel="data" hidden></section>
          <section class="admin-panel" data-admin-panel="logs" hidden></section>
        </section>
      </main>
    </div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="/web_form/liquid-glass.js"></script>
    <script src="/web_form/http-client.js?v=1"></script>
    <script src="/web_form/admin.js?v=global-page-size-20"></script>
  </body>
</html>
