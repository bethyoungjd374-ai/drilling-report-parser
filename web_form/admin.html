<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NexoRig 系统后台</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/web_form/styles.css?v=ai-workflows-1" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar admin-sidebar" aria-label="系统后台菜单">
        <div class="brand">
          <div class="brand-mark brand-logo" aria-label="NexoRig logo">
            <svg class="brand-logo-svg" viewBox="0 0 64 64" aria-hidden="true">
              <path class="logo-stroke" d="M15 49V15l34 34V15" />
              <path class="logo-stroke logo-thin logo-accent" d="M22 16h17c7 0 10 4 10 9s-3 9-10 9H25" />
              <circle class="logo-fill" cx="15" cy="49" r="4" />
              <circle class="logo-fill logo-accent" cx="49" cy="15" r="4" />
            </svg>
          </div>
          <div>
            <strong>NexoRig</strong>
            <span>智井平台</span>
          </div>
        </div>
        <nav class="system-nav admin-sidebar-nav">
          <div class="menu-group open">
            <button class="menu-group-toggle" type="button" aria-expanded="true">
              <span class="admin-menu-icon icon-overview" aria-hidden="true"></span>
              <span>运营工作台</span>
              <span class="menu-chevron">v</span>
            </button>
            <div class="menu-items">
              <a href="#" class="menu-link admin-menu-link active" data-admin-tab="overview"><span class="admin-menu-icon icon-overview" aria-hidden="true"></span><span>总览</span></a>
              <a href="#" class="menu-link admin-menu-link" data-admin-tab="projects"><span class="admin-menu-icon icon-briefcase" aria-hidden="true"></span><span>项目与队伍</span></a>
            </div>
          </div>
          <div class="menu-group open">
            <button class="menu-group-toggle" type="button" aria-expanded="true">
              <span class="admin-menu-icon icon-sparkles" aria-hidden="true"></span>
              <span>AI 工作流</span>
              <span class="menu-chevron">v</span>
            </button>
            <div class="menu-items">
              <a href="#" class="menu-link admin-menu-link" data-admin-tab="aiModels"><span class="admin-menu-icon icon-cpu" aria-hidden="true"></span><span>模型接入</span></a>
              <a href="#" class="menu-link admin-menu-link" data-admin-tab="translationTuning"><span class="admin-menu-icon icon-languages" aria-hidden="true"></span><span>翻译策略</span></a>
              <a href="#" class="menu-link admin-menu-link" data-admin-tab="aiExtraction"><span class="admin-menu-icon icon-sparkles" aria-hidden="true"></span><span>数据提炼</span></a>
            </div>
          </div>
          <div class="menu-group open">
            <button class="menu-group-toggle" type="button" aria-expanded="true">
              <span class="admin-menu-icon icon-shield" aria-hidden="true"></span>
              <span>系统治理</span>
              <span class="menu-chevron">v</span>
            </button>
            <div class="menu-items">
              <a href="#" class="menu-link admin-menu-link" data-admin-tab="users"><span class="admin-menu-icon icon-users" aria-hidden="true"></span><span>账号管理</span></a>
              <a href="#" class="menu-link admin-menu-link" data-admin-tab="roles"><span class="admin-menu-icon icon-shield" aria-hidden="true"></span><span>角色权限</span></a>
              <a href="#" class="menu-link admin-menu-link" data-admin-tab="config"><span class="admin-menu-icon icon-settings" aria-hidden="true"></span><span>系统参数</span></a>
              <a href="#" class="menu-link admin-menu-link" data-admin-tab="data"><span class="admin-menu-icon icon-database" aria-hidden="true"></span><span>数据维护</span></a>
              <a href="#" class="menu-link admin-menu-link" data-admin-tab="logs"><span class="admin-menu-icon icon-logs" aria-hidden="true"></span><span>审计日志</span></a>
            </div>
          </div>
        </nav>
        <div class="sidebar-bottom-actions">
          <a class="menu-link sidebar-system-link" href="/web_form/">
            <span class="admin-menu-icon icon-home" aria-hidden="true"></span>
            <span>返回前台</span>
          </a>
        </div>
      </aside>

      <main class="workspace admin-standalone">
        <header class="topbar placeholder-topbar">
          <div>
            <p class="page-kicker">SYSTEM ADMIN</p>
            <h1>系统后台</h1>
            <p class="source-file-name">账号权限、系统参数、数据维护与操作审计</p>
          </div>
          <div class="top-actions">
            <button class="button secondary" type="button" data-admin-logout>退出登录</button>
          </div>
        </header>

        <section class="admin-console" data-admin-console>
          <section class="admin-panel" data-admin-panel="overview"></section>
          <section class="admin-panel" data-admin-panel="users" hidden></section>
          <section class="admin-panel" data-admin-panel="roles" hidden></section>
          <section class="admin-panel" data-admin-panel="aiModels" hidden></section>
          <section class="admin-panel" data-admin-panel="aiExtraction" hidden></section>
          <section class="admin-panel" data-admin-panel="projects" hidden></section>
          <section class="admin-panel" data-admin-panel="translationTuning" hidden></section>
          <section class="admin-panel" data-admin-panel="config" hidden></section>
          <section class="admin-panel" data-admin-panel="data" hidden></section>
          <section class="admin-panel" data-admin-panel="logs" hidden></section>
        </section>
      </main>
    </div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="/web_form/liquid-glass.js"></script>
    <script src="/web_form/admin.js?v=npt-owner-all-reports-1"></script>
